name: Feature request
description: Suggest a signal, scanner, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it's useful
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New signal / model
        - Scanner
        - Dashboard page
        - Telegram command
        - Data / coverage
        - Other
