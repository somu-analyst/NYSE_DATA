name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pandas numpy pytest
      - name: Run core analytics tests
        working-directory: archive
        run: python -m pytest tests/test_core.py tests/test_core_gex.py -q
